name: Sync README problem list

on:
  push:
    branches: ["master"]
    paths:
      - "problems/**"
      - "scripts/gen-readme.js"
      - ".github/workflows/sync-readme.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "sync-readme"
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Regenerate README problem list
        run: node scripts/gen-readme.js
      - name: Commit if changed
        run: |
          if git diff --quiet -- README.md; then
            echo "README 无变化，跳过提交。"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: 自动同步 README 题目清单 [skip ci]"
          git push
