name: Build problems manifest

on:
  push:
    branches: [master]
    paths:
      - 'problems/**'
      - 'scripts/gen-manifest.js'
      - '.github/workflows/manifest.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate problems.json
        run: node scripts/gen-manifest.js

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain problems.json)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add problems.json
            git commit -m "chore: 自动更新 problems.json"
            git push
          else
            echo "problems.json 无变化，跳过提交。"
          fi
