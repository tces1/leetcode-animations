<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeetCode 算法动画演示集</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #f6f7f9;
    color: #1d2129;
    padding: 32px 24px;
    line-height: 1.5;
  }
  .wrap { max-width: 960px; margin: 0 auto; }
  header { margin-bottom: 28px; }
  h1 { font-size: 26px; margin: 0 0 6px; }
  .sub { color: #6b7280; font-size: 14px; }

  .toolbar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin: 20px 0; }
  input[type=text] {
    flex: 1; min-width: 220px;
    padding: 10px 14px; font-size: 14px;
    border: 1px solid #d1d5db; border-radius: 10px; outline: none;
  }
  input[type=text]:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,.15); }
  .filters { display: flex; gap: 8px; flex-wrap: wrap; }
  .filter {
    font-size: 13px; padding: 6px 13px; border-radius: 999px; cursor: pointer;
    background: #eef0f4; color: #374151; border: 1px solid transparent; user-select: none;
  }
  .filter.active { background: #6366f1; color: #fff; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .card {
    display: block; text-decoration: none; color: inherit;
    background: #fff; border: 1px solid #e5e7eb; border-radius: 14px;
    padding: 18px; transition: transform .15s, box-shadow .15s, border-color .15s;
    position: relative; overflow: hidden;
  }
  .card:hover { transform: translateY(-3px); box-shadow: 0 10px 24px rgba(0,0,0,.08); border-color: #c7cbf5; }
  .card .num {
    font-family: "SF Mono", Menlo, monospace; font-size: 13px; font-weight: 700;
    color: #6366f1; margin-bottom: 6px;
  }
  .card h3 { margin: 0 0 8px; font-size: 17px; }
  .card p { margin: 0; font-size: 13px; color: #6b7280; min-height: 34px; }
  .tags { margin-top: 12px; display: flex; gap: 6px; flex-wrap: wrap; }
  .tag {
    font-size: 11px; padding: 3px 9px; border-radius: 999px;
    background: #f1f2f4; color: #4b5563;
  }
  .diff { position: absolute; top: 16px; right: 16px; font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 999px; }
  .easy { background: #dcfce7; color: #166534; }
  .medium { background: #fef3c7; color: #92400e; }
  .hard { background: #fee2e2; color: #991b1b; }

  .empty { text-align: center; color: #9ca3af; padding: 48px 0; font-size: 14px; }
  footer { margin-top: 32px; color: #9ca3af; font-size: 12px; text-align: center; }
  .count { color:#9ca3af; font-size:13px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🎬 LeetCode 算法动画演示集</h1>
    <div class="sub">用可交互的动画,把经典算法的执行过程一步步看清楚。点击卡片进入对应题目的演示。</div>
  </header>

  <div class="toolbar">
    <input type="text" id="search" placeholder="搜索题号或题名，如 394 / 解码 / 栈">
    <div class="filters" id="filters"></div>
  </div>
  <div class="count" id="count"></div>

  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none;">没有匹配的题目 🤔</div>

  <footer>题目持续增加中 · 文件命名规范：<code>题号-英文题名.html</code></footer>
</div>

<script>
  // ── 题目清单：以后新增一题，只需在这里加一条记录 ──
  var PROBLEMS = [
    {
      id: 394,
      title: "字符串解码",
      titleEn: "Decode String",
      file: "problems/394-decode-string.html",
      difficulty: "medium",
      tags: ["栈", "字符串", "递归"],
      desc: "双栈处理嵌套的 k[...] 结构，由内向外解码。"
    }
  ];

  var grid = document.getElementById('grid');
  var empty = document.getElementById('empty');
  var search = document.getElementById('search');
  var filtersEl = document.getElementById('filters');
  var countEl = document.getElementById('count');
  var DIFF_LABEL = { easy: "简单", medium: "中等", hard: "困难" };
  var activeTag = null;

  // build tag filters
  var allTags = [];
  PROBLEMS.forEach(function(p){ p.tags.forEach(function(t){ if(allTags.indexOf(t)<0) allTags.push(t); }); });
  function renderFilters() {
    filtersEl.innerHTML = '';
    allTags.forEach(function(t){
      var el = document.createElement('span');
      el.className = 'filter' + (activeTag === t ? ' active' : '');
      el.textContent = t;
      el.onclick = function(){ activeTag = (activeTag === t ? null : t); renderFilters(); render(); };
      filtersEl.appendChild(el);
    });
  }

  function render() {
    var q = search.value.trim().toLowerCase();
    var list = PROBLEMS.filter(function(p){
      var hitTag = !activeTag || p.tags.indexOf(activeTag) >= 0;
      var hay = (p.id + ' ' + p.title + ' ' + p.titleEn + ' ' + p.tags.join(' ')).toLowerCase();
      var hitQ = !q || hay.indexOf(q) >= 0;
      return hitTag && hitQ;
    });
    grid.innerHTML = '';
    empty.style.display = list.length ? 'none' : 'block';
    countEl.textContent = '共 ' + list.length + ' 道题';
    list.forEach(function(p){
      var a = document.createElement('a');
      a.className = 'card';
      a.href = p.file;
      a.innerHTML =
        '<div class="diff ' + p.difficulty + '">' + DIFF_LABEL[p.difficulty] + '</div>' +
        '<div class="num">#' + p.id + '</div>' +
        '<h3>' + p.title + '</h3>' +
        '<p>' + p.desc + '</p>' +
        '<div class="tags">' + p.tags.map(function(t){ return '<span class="tag">' + t + '</span>'; }).join('') + '</div>';
      grid.appendChild(a);
    });
  }

  search.addEventListener('input', render);
  renderFilters();
  render();
</script>
</body>
</html>
